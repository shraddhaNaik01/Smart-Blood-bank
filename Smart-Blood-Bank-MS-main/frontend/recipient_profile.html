<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Recipient Profile | Smart Blood Bank Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <style>
        /* Base Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Updated Typography */
        body {
            background-color: #fff5f5; /* Light Red/Pink */
            color: #333;
            font-family: 'Lato', sans-serif; /* Body font */
        }

        h1, h2, h3 {
            font-family: 'Montserrat', sans-serif; /* Heading font */
        }

        /* Header */
        header {
            background-color: #c1121f;
            color: white;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border-bottom-left-radius: 8px; /* Slight roundness */
            border-bottom-right-radius: 8px;
        }

        header h1 {
            font-size: 1.6rem;
            letter-spacing: 1px;
            font-weight: 700;
        }

        /* Container Styling */
        .container {
            max-width: 600px;
            margin: 20px auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 20px;
            min-height: auto;
            max-height: 90vh;
            overflow-y: auto;
        }

        .page-title {
            text-align: center;
            margin-bottom: 30px;
        }

        .page-title h2 {
            color: #c1121f;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .page-title p {
            color: #666;
            font-size: 1.1rem;
        }

        /* Form Styling */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: 'Lato', sans-serif;
            background-color: #fafafa;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #c1121f;
            background-color: white;
            box-shadow: 0 0 0 3px rgba(193, 18, 31, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            background-color: #c1121f;
            color: white;
            padding: 15px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            font-family: 'Montserrat', sans-serif;
        }

        .submit-btn:hover {
            background-color: #a10d19;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(193, 18, 31, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Error and Success Messages */
        .error-message {
            background-color: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #dc3545;
            font-weight: 500;
        }

        .success-message {
            background-color: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #28a745;
            font-weight: 500;
        }

        .required {
            color: #c1121f;
        }

        .info-text {
            font-size: 0.85rem;
            color: #666;
            margin-top: 5px;
            font-style: italic;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .container {
                margin: 20px;
                padding: 30px 20px;
            }
            
            header {
                padding: 15px 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <h1>Smart Blood Bank Management System</h1>
        <div style="font-size: 0.9rem; opacity: 0.9;">Recipient Profile Completion</div>
    </header>

    <div class="container">
        <div class="page-title">
            <h2>Complete Your Recipient Profile</h2>
            <p>Help us serve you better by completing your profile information</p>
        </div>

        <div id="errorMessage" class="error-message" style="display: none;"></div>
        <div id="successMessage" class="success-message" style="display: none;"></div>

        <form id="recipientProfileForm">

            <div class="form-row">
                <div class="form-group">
                    <label for="age">
                        <i class="fas fa-calendar-alt"></i> Age <span class="required">*</span>
                    </label>
                    <input type="number" id="age" name="age" min="1" max="100" required 
                           placeholder="Your age" autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="gender">
                        <i class="fas fa-venus-mars"></i> Gender <span class="required">*</span>
                    </label>
                    <select id="gender" name="gender" required>
                        <option value="">Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="bloodGroup">
                        <i class="fas fa-tint"></i> Blood Group Required <span class="required">*</span>
                    </label>
                    <select id="bloodGroup" name="bloodGroup" required>
                        <option value="">Select Blood Group</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="urgency">
                        <i class="fas fa-exclamation-triangle"></i> Urgency Level <span class="required">*</span>
                    </label>
                    <select id="urgency" name="urgency" required>
                        <option value="">Select Urgency</option>
                        <option value="Low">Low - Routine</option>
                        <option value="Medium">Medium - Within a week</option>
                        <option value="High">High - Within 24 hours</option>
                        <option value="Critical">Critical - Emergency</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="location">
                    <i class="fas fa-map-marker-alt"></i> Location <span class="required">*</span>
                </label>
                <input type="text" id="location" name="location" required 
                       placeholder="City, State" autocomplete="off">
            </div>

            <div class="form-group">
                <label for="hospitalId">
                    <i class="fas fa-hospital"></i> Preferred Hospital <span class="required">*</span>
                </label>
                <select id="hospitalId" name="hospitalId" required>
                    <option value="">Select Hospital</option>
                    <!-- Will be populated dynamically -->
                </select>
                <div class="info-text">Choose your preferred hospital for blood requests</div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                <i class="fas fa-check-circle"></i> Complete Profile & Go to Dashboard
            </button>
        </form>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:3000/api';
        let currentUserId = null;

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            // Get user ID from session storage
            currentUserId = sessionStorage.getItem('currentUserId');
            
            if (!currentUserId) {
                showError('No user session found. Please register again.');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
                return;
            }

            // Load hospitals for dropdown
            loadHospitals();
            
            // Handle form submission
            document.getElementById('recipientProfileForm').addEventListener('submit', handleSubmit);
        });

        // Load hospitals for dropdown
        async function loadHospitals() {
            try {
                console.log('Loading hospitals...');
                const response = await fetch(`${API_BASE_URL}/hospitals`);
                const hospitals = await response.json();
                
                console.log('Loaded hospitals:', hospitals);
                
                const hospitalSelect = document.getElementById('hospitalId');
                hospitalSelect.innerHTML = '<option value="">Select Hospital</option>';
                
                hospitals.forEach(hospital => {
                    const option = document.createElement('option');
                    option.value = hospital.Hospital_ID;
                    option.textContent = `${hospital.Hospital_Name} - ${hospital.Location}`;
                    hospitalSelect.appendChild(option);
                });
                
                console.log('Hospital dropdown populated with', hospitals.length, 'hospitals');
            } catch (error) {
                console.error('Error loading hospitals:', error);
                showError('Failed to load hospitals. Please refresh the page.');
            }
        }

        // Handle form submission
        async function handleSubmit(event) {
            event.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Completing Profile...';
            
            // Get form data
            const formData = new FormData(event.target);
            const hospitalIdValue = formData.get('hospitalId');
            const ageValue = formData.get('age');
            
            const profileData = {
                userId: currentUserId,
                age: ageValue ? parseInt(ageValue) : null,
                gender: formData.get('gender'),
                bloodGroup: formData.get('bloodGroup'),
                urgency: formData.get('urgency'),
                location: formData.get('location'),
                hospitalId: hospitalIdValue ? parseInt(hospitalIdValue) : null
            };

            console.log('Sending profile data:', profileData);
            console.log('Form values:', {
                age: ageValue,
                gender: formData.get('gender'),
                bloodGroup: formData.get('bloodGroup'),
                urgency: formData.get('urgency'),
                location: formData.get('location'),
                hospitalId: hospitalIdValue
            });

            try {
                const response = await fetch(`${API_BASE_URL}/complete-recipient-profile`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(profileData)
                });

                const data = await response.json();

                if (response.ok) {
                    showSuccess(data.message || "Profile completed successfully! Redirecting to dashboard...");
                    
                    // Keep session data for dashboard access and redirect
                    setTimeout(() => {
                        window.location.href = 'recipient_dashboard.html';
                    }, 2000);
                } else {
                    throw new Error(data.error || 'Failed to complete profile');
                }
            } catch (error) {
                console.error('Error completing profile:', error);
                showError(error.message || 'Failed to complete profile. Please try again.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-check-circle"></i> Complete Profile & Go to Dashboard';
            }
        }

        // Show error message
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            document.getElementById('successMessage').style.display = 'none';
            
            // Scroll to top to show error
            window.scrollTo(0, 0);
        }

        // Show success message
        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            document.getElementById('errorMessage').style.display = 'none';
            
            // Scroll to top to show success
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
